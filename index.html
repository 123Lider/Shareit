<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web ShareIt</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .screen { display: none; width: 100%; animation: fadeIn 0.3s; }
        .active-screen { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Buttons */
        .btn { padding: 15px 30px; margin: 10px 0; font-size: 18px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-send { background-color: #008CBA; color: white; }
        .btn-receive { background-color: #4CAF50; color: white; }
        .btn-back { background-color: #f44336; color: white; padding: 10px 20px; font-size: 14px; margin-bottom: 20px; width: auto;}
        .btn:active { transform: scale(0.95); }

        /* Radar Animation */
        .radar-box { position: relative; width: 200px; height: 200px; margin: 30px auto; display: flex; justify-content: center; align-items: center; }
        .radar-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #4CAF50; animation: pulse 2s infinite; }
        .radar-circle:nth-child(2) { animation-delay: 0.5s; }
        .radar-circle:nth-child(3) { animation-delay: 1s; }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .uid-display { font-size: 32px; font-weight: bold; color: #4CAF50; z-index: 10; background: #121212; padding: 10px; border-radius: 10px; }

        /* Inputs & Lists */
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; outline: none; }
        .file-list, .receive-list { text-align: left; margin-top: 15px; background: #1e1e1e; padding: 10px; border-radius: 10px; min-height: 100px; }
        
        /* Scrollable Box for files */
        .scroll-box { max-height: 250px; overflow-y: auto; }
        
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #333; font-size: 14px;}
        .file-item:last-child { border-bottom: none; }
        
        .download-btn { background: #4CAF50; color: white; text-decoration: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none;}
        .download-btn.downloaded { background: #555; color: #ccc; } /* Downloaded state color */
        
        #status { color: #ffeb3b; margin-top: 10px; font-size: 14px; font-weight: bold; }
        .serial-no { color: #00bcd4; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="container screen active-screen">
        <h1 style="margin-bottom: 40px; color: #00bcd4; margin-top: 50px;">Web ShareIt</h1>
        <button class="btn btn-send" onclick="showScreen('sendScreen')">📤 Send</button>
        <button class="btn btn-receive" onclick="showScreen('receiveScreen'); startReceiving();">📥 Receive</button>
    </div>

    <!-- SEND SCREEN -->
    <div id="sendScreen" class="container screen">
        <button class="btn btn-back" onclick="showScreen('homeScreen')">⬅ Back</button>
        <h2 style="margin-bottom: 10px;">Send Files</h2>
        
        <!-- Input & Send Button on TOP -->
        <input type="text" id="receiverUID" placeholder="Enter Receiver's UID (e.g. 123456)">
        <button class="btn btn-send" onclick="sendFiles()" style="margin-bottom: 10px;">🚀 Send Now</button>
        <div id="status"></div>
        
        <!-- File Picker -->
        <input type="file" id="filePicker" multiple style="background: #333; color: white;">
        
        <!-- Selected Files List (Scrollable) -->
        <div class="file-list scroll-box" id="selectedFilesBox">
            <span style="color:#888;">No files selected</span>
        </div>
    </div>

    <!-- RECEIVE SCREEN -->
    <div id="receiveScreen" class="container screen">
        <button class="btn btn-back" onclick="showScreen('homeScreen')">⬅ Back</button>
        <h2>Waiting for files...</h2>
        
        <div class="radar-box">
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
            <div class="uid-display" id="myUIDDisplay">------</div>
        </div>
        <p style="margin-bottom: 10px;">Give this UID to the sender</p>

        <!-- Received Files List (Scrollable) -->
        <div class="receive-list scroll-box">
            <h4 style="margin-bottom: 10px; color: #aaa;">Incoming Files:</h4>
            <div id="receivedFilesBox">
                <!-- Received files will appear here -->
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. CONFIGURATION (আপনার আসল API Key বসান)
    // ==========================================
    
    // Firebase Config (Firebase Console থেকে পাবেন)
    const firebaseConfig = {
  apiKey: "AIzaSyDrWyO51TZ8xhV5vgCYKxK-nONAkgsW3u8",
  authDomain: "shareit-c6bdf.firebaseapp.com",
  projectId: "shareit-c6bdf",
  storageBucket: "shareit-c6bdf.firebasestorage.app",
  messagingSenderId: "948302866705",
  appId: "1:948302866705:web:4965a54ec451046f2f84b0",
  measurementId: "G-9CG7PQGCJM"
};
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Cloudinary Config
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dhfbdy7rq/auto/upload";
    const CLOUDINARY_UPLOAD_PRESET = "MiniDrive";

    // ==========================================
    // 2. UI NAVIGATION
    // ==========================================
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    // ==========================================
    // 3. UID GENERATION (5 Hours Logic)
    // ==========================================
    function getMyUID() {
        const now = Date.now();
        const fiveHours = 5 * 60 * 60 * 1000;
        let uid = localStorage.getItem('shareUID');
        let timestamp = localStorage.getItem('shareUID_time');

        if (uid && timestamp && (now - timestamp < fiveHours)) {
            return uid;
        } else {
            uid = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('shareUID', uid);
            localStorage.setItem('shareUID_time', now.toString());
            return uid;
        }
    }

    // ==========================================
    // 4. SEND LOGIC
    // ==========================================
    const filePicker = document.getElementById('filePicker');
    const selectedFilesBox = document.getElementById('selectedFilesBox');
    let filesToUpload = [];

    // Show selected files with Serial Numbers
    filePicker.addEventListener('change', (e) => {
        filesToUpload = Array.from(e.target.files);
        if(filesToUpload.length === 0) {
            selectedFilesBox.innerHTML = "<span style='color:#888;'>No files selected</span>";
            return;
        }
        let html = "";
        filesToUpload.forEach((f, index) => {
            html += `<div class="file-item">
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90%;">
                            <span class="serial-no">${index + 1}.</span> ${f.name}
                        </span>
                     </div>`;
        });
        selectedFilesBox.innerHTML = html;
    });

    async function sendFiles() {
        const receiverUID = document.getElementById('receiverUID').value.trim();
        const statusEl = document.getElementById('status');

        if(filesToUpload.length === 0) return alert("Please select files first!");
        if(!receiverUID) return alert("Please enter receiver UID!");

        statusEl.innerText = "Starting upload...";

        for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            try {
                statusEl.innerText = `Uploading ${i+1} of ${filesToUpload.length}: ${file.name}...`;
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.secure_url) {
                    database.ref('shares/' + receiverUID).push({
                        fileName: file.name,
                        fileUrl: data.secure_url,
                        timestamp: Date.now()
                    });
                }
            } catch (error) {
                console.error("Upload error: ", error);
                alert("Failed to upload: " + file.name);
            }
        }
        statusEl.style.color = "#4CAF50";
        statusEl.innerText = "✅ All files sent successfully!";
        setTimeout(() => { statusEl.innerText = ""; statusEl.style.color = "#ffeb3b"; }, 4000);
    }

    // ==========================================
    // 5. RECEIVE & DOWNLOAD LOGIC
    // ==========================================
    let isListening = false;
    let receiveCounter = 0;
    
    function startReceiving() {
        const myUID = getMyUID();
        document.getElementById('myUIDDisplay').innerText = myUID;

        if(!isListening) {
            isListening = true;
            const receivedFilesBox = document.getElementById('receivedFilesBox');
            receivedFilesBox.innerHTML = ''; // Clear old files
            receiveCounter = 0; // Reset counter
            
            database.ref('shares/' + myUID).on('child_added', (snapshot) => {
                const data = snapshot.val();
                receiveCounter++;
                
                // fl_attachment forces direct download instead of opening in browser
                const downloadUrl = data.fileUrl.replace('/upload/', '/upload/fl_attachment/');

                const fileHTML = `
                    <div class="file-item">
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%;" title="${data.fileName}">
                            <span class="serial-no">${receiveCounter}.</span> ${data.fileName}
                        </span>
                        <a href="${downloadUrl}" class="download-btn" onclick="markDownloaded(this)" download="${data.fileName}">Download</a>
                    </div>
                `;
                receivedFilesBox.innerHTML += fileHTML;
            });
        }
    }

    // Change button text and color after clicking download
    function markDownloaded(btn) {
        btn.innerText = "Downloaded ✔";
        btn.classList.add("downloaded");
    }
</script>

</body>
</html>
