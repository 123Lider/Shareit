<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web ShareIt Pro</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        /* Modern Premium UI Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; padding: 25px; text-align: center; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .screen { display: none; width: 100%; animation: slideIn 0.4s ease-out; }
        .active-screen { display: block; }
        
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Buttons */
        .btn { 
            padding: 15px 30px; margin: 12px 0; font-size: 16px; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; width: 100%; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-send { background: linear-gradient(45deg, #00B4DB, #0083B0); color: white; box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4); }
        .btn-receive { background: linear-gradient(45deg, #11998e, #38ef7d); color: white; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4); }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px; font-size: 12px; margin-bottom: 20px; width: auto; border-radius: 8px;}
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }

        /* Radar Animation */
        .radar-box { position: relative; width: 180px; height: 180px; margin: 30px auto; display: flex; justify-content: center; align-items: center; }
        .radar-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #38ef7d; animation: pulse 2s infinite; }
        .radar-circle:nth-child(2) { animation-delay: 0.5s; }
        .radar-circle:nth-child(3) { animation-delay: 1s; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .uid-display { font-size: 35px; font-weight: bold; color: #38ef7d; z-index: 10; text-shadow: 0 0 10px rgba(56, 239, 125, 0.5); }

        /* Inputs */
        input[type="text"] { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.2); color: white; outline: none; font-size: 16px; text-align: center;
        }
        input[type="text"]::placeholder { color: #aaa; }
        
        .file-upload-wrapper { position: relative; margin: 10px 0 20px 0; }
        .custom-file-upload { 
            display: inline-block; padding: 15px; width: 100%; border-radius: 12px; border: 2px dashed rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .custom-file-upload:hover { border-color: #00B4DB; background: rgba(0, 180, 219, 0.1); }
        input[type="file"] { display: none; }

        /* Scrollable File List */
        .scroll-box { max-height: 350px; overflow-y: auto; padding-right: 5px; margin-top: 15px;}
        .scroll-box::-webkit-scrollbar { width: 6px; }
        .scroll-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* File Card (Bigger Body & Previews) */
        .file-card { 
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 12px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center; position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Badges */
        .badge { 
            position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 20px;
            font-size: 10px; font-weight: bold; text-transform: uppercase; z-index: 2;
        }
        .badge-image { background: #E91E63; color: white; }
        .badge-video { background: #FF9800; color: white; }
        .badge-other { background: #9E9E9E; color: white; }

        /* Media Preview */
        .preview-media { 
            width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 10px;
            background: #111;
        }

        .file-info { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .file-name { font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; text-align: left;}
        
        .download-btn { 
            background: #38ef7d; color: #000; text-decoration: none; padding: 8px 15px; 
            border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; border: none;
            box-shadow: 0 4px 10px rgba(56, 239, 125, 0.3);
        }
        .download-btn.downloaded { background: #555; color: #aaa; box-shadow: none;}

        #status { color: #FFD700; margin-top: 10px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="container screen active-screen">
        <div style="font-size: 50px; margin-bottom: 10px;">⚡</div>
        <h1 style="margin-bottom: 40px; color: #fff; font-weight: 800; letter-spacing: 2px;">SHARE<span style="color: #00B4DB;">PRO</span></h1>
        <button class="btn btn-send" onclick="showScreen('sendScreen')">📤 Send Files</button>
        <button class="btn btn-receive" onclick="showScreen('receiveScreen'); startReceiving();">📥 Receive Files</button>
    </div>

    <!-- SEND SCREEN -->
    <div id="sendScreen" class="container screen">
        <button class="btn btn-back" onclick="showScreen('homeScreen')">⬅ Back</button>
        
        <input type="text" id="receiverUID" placeholder="Enter 6-Digit Receiver UID">
        <button class="btn btn-send" onclick="sendFiles()">🚀 Start Transfer</button>
        <div id="status"></div>
        
        <div class="file-upload-wrapper">
            <label class="custom-file-upload">
                <input type="file" id="filePicker" multiple>
                ➕ Select Images & Videos
            </label>
        </div>
        
        <!-- Selected Files Preview -->
        <div class="scroll-box" id="selectedFilesBox">
            <p style="color:#888; font-size: 14px;">No files selected yet</p>
        </div>
    </div>

    <!-- RECEIVE SCREEN -->
    <div id="receiveScreen" class="container screen">
        <button class="btn btn-back" onclick="showScreen('homeScreen')">⬅ Back</button>
        <h3 style="color: #ddd; margin-bottom: 20px;">Radar Active</h3>
        
        <div class="radar-box">
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
            <div class="uid-display" id="myUIDDisplay">------</div>
        </div>
        <p style="color: #aaa; font-size: 14px;">Share this UID with sender</p>

        <!-- Received Files List -->
        <div class="scroll-box" id="receivedFilesBox">
            <!-- Incoming files will appear here -->
        </div>
    </div>

<script>
    // ==========================================
    // 1. CONFIGURATION (আপনার API Key বসান)
    // ==========================================
    const firebaseConfig = {
  apiKey: "AIzaSyDrWyO51TZ8xhV5vgCYKxK-nONAkgsW3u8",
  authDomain: "shareit-c6bdf.firebaseapp.com",
  projectId: "shareit-c6bdf",
  storageBucket: "shareit-c6bdf.firebasestorage.app",
  messagingSenderId: "948302866705",
  appId: "1:948302866705:web:4965a54ec451046f2f84b0",
  measurementId: "G-9CG7PQGCJM"
};
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Cloudinary Config
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dhfbdy7rq/auto/upload";
    const CLOUDINARY_UPLOAD_PRESET = "MiniDrive";

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    // ==========================================
    // 2. UID GENERATION & AUTO DELETE (5 Hours)
    // ==========================================
    function getMyUID() {
        const now = Date.now();
        const fiveHours = 5 * 60 * 60 * 1000;
        let uid = localStorage.getItem('shareUID');
        let timestamp = localStorage.getItem('shareUID_time');

        if (uid && timestamp && (now - timestamp < fiveHours)) {
            return uid;
        } else {
            // Delete old files from Database before creating new UID
            if(uid) {
                database.ref('shares/' + uid).remove();
            }
            
            // Generate New UID
            uid = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('shareUID', uid);
            localStorage.setItem('shareUID_time', now.toString());
            return uid;
        }
    }

    // ==========================================
    // 3. SEND LOGIC & PREVIEWS
    // ==========================================
    const filePicker = document.getElementById('filePicker');
    const selectedFilesBox = document.getElementById('selectedFilesBox');
    let filesToUpload = [];

    filePicker.addEventListener('change', (e) => {
        filesToUpload = Array.from(e.target.files);
        if(filesToUpload.length === 0) return;
        
        let html = "";
        filesToUpload.forEach((file, index) => {
            let isVideo = file.type.startsWith('video');
            let isImage = file.type.startsWith('image');
            
            let badgeClass = isVideo ? 'badge-video' : (isImage ? 'badge-image' : 'badge-other');
            let badgeText = isVideo ? 'VIDEO 🎬' : (isImage ? 'IMAGE 🖼️' : 'FILE 📄');
            
            // Local preview using ObjectURL
            let mediaTag = "";
            if (isVideo) {
                mediaTag = `<video class="preview-media" src="${URL.createObjectURL(file)}#t=0.1" controls></video>`;
            } else if (isImage) {
                mediaTag = `<img class="preview-media" src="${URL.createObjectURL(file)}">`;
            } else {
                mediaTag = `<div class="preview-media" style="display:flex; align-items:center; justify-content:center;">📄 No Preview</div>`;
            }

            html += `
                <div class="file-card">
                    <span class="badge ${badgeClass}">${badgeText}</span>
                    ${mediaTag}
                    <div class="file-info">
                        <span class="file-name"><b>${index + 1}.</b> ${file.name}</span>
                        <span style="font-size:11px; color:#aaa;">Pending</span>
                    </div>
                </div>`;
        });
        selectedFilesBox.innerHTML = html;
    });

    async function sendFiles() {
        const receiverUID = document.getElementById('receiverUID').value.trim();
        const statusEl = document.getElementById('status');

        if(filesToUpload.length === 0) return alert("Please select files first!");
        if(!receiverUID) return alert("Please enter receiver UID!");

        statusEl.innerText = "🚀 Preparing Transfer...";

        for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            try {
                statusEl.innerText = `Uploading ${i+1} of ${filesToUpload.length}...`;
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.secure_url) {
                    database.ref('shares/' + receiverUID).push({
                        fileName: file.name,
                        fileUrl: data.secure_url,
                        fileType: file.type,
                        timestamp: Date.now()
                    });
                }
            } catch (error) {
                alert("Failed to upload: " + file.name);
            }
        }
        statusEl.style.color = "#38ef7d";
        statusEl.innerText = "✅ Transfer Complete!";
        setTimeout(() => { statusEl.innerText = ""; statusEl.style.color = "#FFD700"; }, 4000);
    }

    // ==========================================
    // 4. RECEIVE & PREVIEW LOGIC
    // ==========================================
    let isListening = false;
    let receiveCounter = 0;
    
    function startReceiving() {
        const myUID = getMyUID();
        document.getElementById('myUIDDisplay').innerText = myUID;

        if(!isListening) {
            isListening = true;
            const receivedFilesBox = document.getElementById('receivedFilesBox');
            receivedFilesBox.innerHTML = ''; 
            receiveCounter = 0; 
            
            database.ref('shares/' + myUID).on('child_added', (snapshot) => {
                const data = snapshot.val();
                receiveCounter++;
                
                let isVideo = data.fileType && data.fileType.startsWith('video');
                let isImage = data.fileType && data.fileType.startsWith('image');
                
                let badgeClass = isVideo ? 'badge-video' : (isImage ? 'badge-image' : 'badge-other');
                let badgeText = isVideo ? 'VIDEO 🎬' : (isImage ? 'IMAGE 🖼️' : 'FILE 📄');

                // Generate Preview Tag
                let mediaTag = "";
                if (isVideo) {
                    mediaTag = `<video class="preview-media" src="${data.fileUrl}#t=0.1" controls preload="metadata"></video>`;
                } else if (isImage) {
                    mediaTag = `<img class="preview-media" src="${data.fileUrl}">`;
                }

                // URL to Force Download Original HD File
                const downloadUrl = data.fileUrl.replace('/upload/', '/upload/fl_attachment/');

                const fileHTML = `
                    <div class="file-card">
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        ${mediaTag}
                        <div class="file-info">
                            <span class="file-name" title="${data.fileName}"><b>${receiveCounter}.</b> ${data.fileName}</span>
                            <a href="${downloadUrl}" class="download-btn" onclick="markDownloaded(this)">📥 Save HD</a>
                        </div>
                    </div>
                `;
                receivedFilesBox.innerHTML += fileHTML;
            });
        }
    }

    function markDownloaded(btn) {
        btn.innerHTML = "✔ Saved";
        btn.classList.add("downloaded");
    }
</script>

</body>
</html>
